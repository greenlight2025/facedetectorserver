<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>人脸颜值检测</title>
  <style>
    body { margin: 2rem; font-family: system-ui, sans-serif; }
    .container { max-width: 600px; margin: 0 auto; }
    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      white-space: pre-line;
      background: #f9f9f9;
      min-height: 80px;
    }
    button {
      padding: 0.5rem 1rem;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
    }
    button:hover {
      background: #0051bb;
    }
    input[type="file"] {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 人脸颜值检测</h1>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="detectFace()">开始检测</button>
    <div id="result">结果将显示在这里...</div>
  </div>

  <script>
    async function detectFace() {
      const file = document.getElementById('imageInput').files[0];
      const resultEl = document.getElementById('result');
      
      // 校验文件
      if (!file) {
        alert('请选择要检测的图片！');
        return;
      }

      // 显示加载状态
      resultEl.textContent = '🔄 正在检测中...';

      try {
        // 1. 将图片转为Base64（去掉data:image/*;base64,前缀）
        const base64Str = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const base64 = e.target.result.split(',')[1];
            resolve(base64);
          };
          reader.onerror = (err) => reject(new Error('图片转换失败：' + err.message));
          reader.readAsDataURL(file);
        });

        // 2. 调用Netlify函数（修复：使用相对路径，适配Netlify域名）
        const response = await fetch('/.netlify/functions/api/detect', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ image: base64Str }),
          timeout: 20000 // 20秒超时
        });

        // 修复2：先校验响应状态
        if (!response.ok) {
          throw new Error(`请求失败：${response.status} ${response.statusText}`);
        }

        // 修复3：先读取文本，再解析JSON（方便调试）
        const rawText = await response.text();
        console.log('函数返回原始内容：', rawText);

        // 检查是否为空响应
        if (!rawText) {
          throw new Error('后端返回空响应，请检查Netlify函数日志');
        }

        // 尝试解析JSON
        let data;
        try {
          data = JSON.parse(rawText);
        } catch (jsonErr) {
          throw new Error(`JSON解析失败：${jsonErr.message}，原始内容：${rawText.substring(0, 200)}`);
        }

        // 显示结果
        resultEl.textContent = data.parsed || '检测完成，但无结果';

      } catch (err) {
        // 友好显示错误信息
        resultEl.textContent = `❌ 检测失败：${err.message}`;
        console.error('完整错误信息：', err);
      }
    }
  </script>
</body>
</html>
